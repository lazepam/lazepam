<svg width="830" height="200" viewBox="0 0 830 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d4d"/>
      <stop offset="50%" style="stop-color:#006d7a"/>
      <stop offset="100%" style="stop-color:#003d4d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="830" height="200" fill="url(#bg)"/>

  <!-- Hexagon pattern left -->
  <g stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.15">
    <polygon points="30,10 55,10 67,30 55,50 30,50 18,30"/>
    <polygon points="5,50 30,50 42,70 30,90 5,90 -7,70"/>
    <polygon points="55,50 80,50 92,70 80,90 55,90 43,70"/>
    <polygon points="30,90 55,90 67,110 55,130 30,130 18,110"/>
    <polygon points="5,130 30,130 42,150 30,170 5,170 -7,150"/>
    <polygon points="55,130 80,130 92,150 80,170 55,170 43,150"/>
  </g>

  <!-- Atom right -->
  <g stroke="#00e5ff" stroke-width="1.2" fill="none" opacity="0.2" transform="translate(730,100)">
    <ellipse cx="0" cy="0" rx="55" ry="22"/>
    <ellipse cx="0" cy="0" rx="55" ry="22" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="55" ry="22" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="6" fill="#00e5ff" opacity="0.4"/>
  </g>

  <!-- Bar chart -->
  <g opacity="0.2" fill="#00e5ff">
    <rect x="780" y="60" width="10" height="80"/>
    <rect x="795" y="40" width="10" height="100"/>
    <rect x="810" y="70" width="10" height="70"/>
  </g>

  <!-- Neural dots -->
  <g fill="#00e5ff" opacity="0.25">
    <circle cx="150" cy="20" r="3"/>
    <circle cx="180" cy="45" r="3"/>
    <circle cx="160" cy="70" r="3"/>
    <circle cx="200" cy="30" r="3"/>
    <line x1="150" y1="20" x2="180" y2="45" stroke="#00e5ff" stroke-width="1"/>
    <line x1="180" y1="45" x2="160" y2="70" stroke="#00e5ff" stroke-width="1"/>
    <line x1="150" y1="20" x2="200" y2="30" stroke="#00e5ff" stroke-width="1"/>
    <line x1="200" y1="30" x2="180" y2="45" stroke="#00e5ff" stroke-width="1"/>
  </g>

  <!-- Name -->
  <text x="415" y="58" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)" letter-spacing="4">MATT DERYA</text>

  <!-- Title -->
  <text x="415" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#00e5ff" text-anchor="middle" filter="url(#softglow)">Data Scientist | AI/ML Specialist | GenAI &amp; LLM Expert</text>

  <!-- Subtitle -->
  <text x="415" y="108" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#b2ebf2" text-anchor="middle">Transforming Pharmaceutical R&amp;D with Deep Learning &amp; Agentic AI</text>

  <!-- Tech stack -->
  <text x="415" y="135" font-family="Arial, sans-serif" font-size="11" fill="#e0f7fa" text-anchor="middle" opacity="0.9">Python  •  TensorFlow  •  PyTorch  •  LangChain  •  Computer Vision  •  NLP  •  Power BI  •  Tableau  •  AWS</text>

  <!-- Divider -->
  <line x1="160" y1="148" x2="670" y2="148" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Achievements -->
  <text x="415" y="170" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd700" text-anchor="middle">Caltech AI/ML Certified  |  15+ Years Pharma  |  90% Cost Reduction in Clinical Trials  |  50% Productivity Gain</text>
</svg>
